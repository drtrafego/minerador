  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgres://${POSTGRES_USER:-minerador}:${POSTGRES_PASSWORD:-minerador}@postgres:5432/${POSTGRES_DB:-minerador}
  #   networks:
  #     - minerador_net

volumes:
  postgres-data:

networks:
  minerador_net:
    driver: bridge
