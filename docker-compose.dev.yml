services:
  postgres:
    image: postgres:16-alpine
    container_name: minerador_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: minerador
      POSTGRES_PASSWORD: minerador
      POSTGRES_DB: minerador
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minerador -d minerador"]
      interval: 5s
      timeout: 5s
      retries: 10

  scrapling:
    build:
      context: ./scrapling
      dockerfile: Dockerfile
    container_name: minerador_scrapling_dev
    restart: unless-stopped
    environment:
      SCRAPLING_SHARED_SECRET: dev_scrapling_secret_local
      SCRAPLING_LOG_LEVEL: info
      SCRAPLING_HEADLESS: "true"
      SCRAPLING_MAX_CONCURRENCY: "2"
      SCRAPLING_IG_SESSION_COOKIE: ""
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/v1/health',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    shm_size: 1gb

volumes:
  postgres-data-dev:
